<!DOCTYPE html>

<html lang="it">

<head>

    <meta charset="UTF-8">

    <title>Richieste Reset</title>

</head>

<body style="
    background:#111;
    color:white;
    font-family:Arial;
    padding:40px;
">

    <h1>
        🔔 Richieste Reset Password
    </h1>

    {% for richiesta in richieste %}

    <div style="
            background:#1f1f1f;
            padding:20px;
            border-radius:15px;
            margin-bottom:15px;
        ">

        <p>
            📧 {{ richiesta.email }}
        </p>

        <p>
            📱 {{ richiesta.contatto }}
        </p>

        <p>
            🔑
            {{ richiesta.token }}
        </p>

        <a href="/reset_password/{{ richiesta.token }}">

            <button style="
                    background:gold;
                    color:black;
                    border:none;
                    padding:10px 14px;
                    border-radius:10px;
                    cursor:pointer;
                ">

                🔗 Apri Reset

            </button>

        </a>

    </div>

    {% endfor %}

</body>

</html>
