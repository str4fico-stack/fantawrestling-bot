{% extends "base.html" %}

{% block title %}
Nuova Password
{% endblock %}

{% block content %}

<style>
    .reset-box {

        max-width: 500px;

        margin: auto;

        margin-top: 80px;

        background: #1f1f1f;

        padding: 35px;

        border-radius: 20px;

        border: 1px solid #333;
    }

    .reset-box h1 {

        color: gold;

        margin-bottom: 25px;
    }

    input {

        width: 100%;

        padding: 15px;

        border: none;

        border-radius: 12px;

        background: #2a2a2a;

        color: white;

        margin-bottom: 20px;
    }

    button {

        width: 100%;

        padding: 15px;

        border: none;

        border-radius: 12px;

        background: gold;

        color: black;

        font-weight: bold;

        cursor: pointer;
    }
</style>

<div class="reset-box">

    <h1>
        🔑 Nuova Password
    </h1>

    <form method="POST">

        <input type="password" name="password" placeholder="Nuova Password" required>

        <button type="submit">

            AGGIORNA PASSWORD

        </button>

    </form>

</div>

{% endblock %}
