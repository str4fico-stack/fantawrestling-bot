<!DOCTYPE html>
<html lang="it">

<head>

    <meta charset="UTF-8">

    <title>Login Utente</title>

    <style>

        * {

            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {

            background: #111;
            color: white;
            font-family: Arial;

            display: flex;
            justify-content: center;
            align-items: center;

            height: 100vh;
        }

        .box {

            background: #1f1f1f;

            padding: 40px;

            border-radius: 18px;

            width: 400px;
        }

        h1 {

            color: gold;

            margin-bottom: 30px;

            text-align: center;
        }

        input {

            width: 100%;

            padding: 14px;

            margin-bottom: 15px;

            border: none;

            border-radius: 10px;

            background: #2a2a2a;

            color: white;
        }

        button {

            width: 100%;

            padding: 14px;

            border: none;

            border-radius: 10px;

            background: crimson;

            color: white;

            font-weight: bold;

            cursor: pointer;
        }

    </style>

</head>

<body>

    <div class="box">

        <h1>🎮 Login Giocatore</h1>

        <form method="POST">

            <input
                type="text"
                name="username"
                placeholder="Username"
                required
            >

            <input
                type="password"
                name="password"
                placeholder="Password"
                required
            >

            <button type="submit">
                ACCEDI
            </button>

        </form>

        <a href="/forgot_password"
        style="color:gold;">

            Password dimenticata?

        </a>

    </div>

</body>

</html>
