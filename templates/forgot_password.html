<!DOCTYPE html>
<html lang="it">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Recupero Password</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {

            background:
                linear-gradient(135deg,
                    #0f0f0f,
                    #1b1b1b);

            font-family: Arial;

            min-height: 100vh;

            display: flex;

            justify-content: center;

            align-items: center;

            padding: 20px;

            color: white;
        }

        .container {

            width: 100%;

            max-width: 450px;

            background: #1f1f1f;

            padding: 35px;

            border-radius: 20px;

            box-shadow:
                0 0 25px rgba(0, 0, 0, 0.5);

            border: 1px solid #333;
        }

        h1 {

            text-align: center;

            margin-bottom: 15px;

            color: gold;

            font-size: 32px;
        }

        .subtitle {

            text-align: center;

            color: #bbb;

            margin-bottom: 30px;

            line-height: 1.5;
        }

        input {

            width: 100%;

            padding: 16px;

            margin-bottom: 18px;

            border: none;

            border-radius: 12px;

            background: #2a2a2a;

            color: white;

            font-size: 16px;

            outline: none;

            transition: 0.3s;
        }

        input:focus {

            border: 1px solid crimson;

            box-shadow:
                0 0 10px rgba(220, 20, 60, 0.4);
        }

        button {

            width: 100%;

            padding: 16px;

            border: none;

            border-radius: 12px;

            background:
                linear-gradient(135deg,
                    crimson,
                    #ff2f5b);

            color: white;

            font-size: 16px;

            font-weight: bold;

            cursor: pointer;

            transition: 0.3s;
        }

        button:hover {

            transform: translateY(-2px);

            box-shadow:
                0 0 15px rgba(255, 0, 80, 0.5);
        }

        .back {

            display: block;

            text-align: center;

            margin-top: 20px;

            color: #ccc;

            text-decoration: none;

            font-size: 14px;
        }

        .back:hover {

            color: gold;
        }
    </style>

</head>

<body>

    <div class="container">

        <h1>
            🔑 Recupera Password
        </h1>

        <div class="subtitle">

            Inserisci email e un contatto Telegram
            o numero di telefono per ricevere assistenza.

        </div>

        <form method="POST">

            <input type="email" name="email" placeholder="📧 Email" required>

            <input type="text" name="contatto" placeholder="📱 Telegram o numero telefono" required>

            <button type="submit">

                🚀 Invia Richiesta

            </button>

        </form>

        <a href="/user_login" class="back">

            ← Torna al Login

        </a>

    </div>

</body>

</html>
