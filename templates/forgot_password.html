{% extends "base.html" %}

{% block title %}
Recupera Password
{% endblock %}

{% block content %}

<style>
    .reset-wrapper {

        min-height: 80vh;

        display: flex;

        justify-content: center;

        align-items: center;

        padding: 20px;
    }

    .reset-box {

        width: 100%;

        max-width: 500px;

        background:
            linear-gradient(135deg,
                #1d1d1d,
                #262626);

        padding: 40px;

        border-radius: 22px;

        border: 1px solid #333;

        box-shadow:
            0 0 30px rgba(0, 0, 0, 0.45);
    }

    .reset-box h1 {

        color: gold;

        font-size: 36px;

        margin-bottom: 15px;

        text-align: center;
    }

    .reset-box p {

        color: #aaa;

        text-align: center;

        margin-bottom: 30px;

        line-height: 1.6;
    }

    input {

        width: 100%;

        padding: 16px;

        border: none;

        border-radius: 12px;

        background: #2d2d2d;

        color: white;

        font-size: 15px;

        margin-bottom: 20px;

        outline: none;

        transition: 0.3s;
    }

    input:focus {

        border: 1px solid gold;

        box-shadow:
            0 0 10px rgba(255, 215, 0, 0.3);
    }

    button {

        width: 100%;

        padding: 16px;

        border: none;

        border-radius: 12px;

        background:
            linear-gradient(135deg,
                gold,
                #ffcf33);

        color: black;

        font-weight: bold;

        font-size: 16px;

        cursor: pointer;

        transition: 0.3s;
    }

    button:hover {

        transform: translateY(-2px);

        box-shadow:
            0 0 14px rgba(255, 215, 0, 0.35);
    }

    .reset-link-box {

        margin-top: 30px;

        background: #1f1f1f;

        padding: 20px;

        border-radius: 16px;

        border: 1px solid gold;
    }

    .reset-link-title {

        color: gold;

        margin-bottom: 15px;

        font-weight: bold;

        font-size: 18px;
    }

    .reset-link-input {

        width: 100%;

        padding: 14px;

        border: none;

        border-radius: 10px;

        background: #2a2a2a;

        color: white;

        font-size: 14px;
    }

    .back-link {

        display: block;

        margin-top: 25px;

        text-align: center;

        color: #bbb;

        text-decoration: none;

        transition: 0.3s;
    }

    .back-link:hover {

        color: gold;
    }

    @media(max-width:600px) {

        .reset-box {

            padding: 30px 25px;
        }

        .reset-box h1 {

            font-size: 30px;
        }
    }
</style>

<div class="reset-wrapper">

    <div class="reset-box">

        <h1>
            🔑 Recupera Password
        </h1>

        <p>

            Inserisci la tua email
            per generare il link
            di reset password.

        </p>

        <form method="POST">

            <input type="email" name="email" placeholder="📧 Inserisci Email" required>

            <button type="submit">

                🚀 GENERA LINK RESET

            </button>

        </form>

        {% if reset_link %}

        <div class="reset-link-box">

            <div class="reset-link-title">

                🔗 Link Reset Generato

            </div>

            <input class="reset-link-input" type="text" value="{{ reset_link }}" readonly>

        </div>

        {% endif %}

        <a href="/user_login" class="back-link">

            ← Torna al Login

        </a>

    </div>

</div>

{% endblock %}
