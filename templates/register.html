<!DOCTYPE html>
<html lang="it">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Registrazione</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {

            background:
                linear-gradient(135deg,
                    #0f0f0f,
                    #1b1b1b);

            color: white;

            font-family: Arial;

            min-height: 100vh;

            display: flex;

            justify-content: center;

            align-items: center;

            padding: 20px;
        }

        .box {

            width: 100%;

            max-width: 460px;

            background:
                linear-gradient(135deg,
                    #1d1d1d,
                    #272727);

            padding: 40px;

            border-radius: 24px;

            border: 1px solid #333;

            box-shadow:
                0 0 25px rgba(0, 0, 0, 0.45);
        }

        .logo {

            text-align: center;

            margin-bottom: 30px;
        }

        .logo h1 {

            color: gold;

            font-size: 40px;

            margin-bottom: 10px;
        }

        .logo p {

            color: #aaa;

            line-height: 1.5;

            font-size: 15px;
        }

        .field {

            margin-bottom: 18px;
        }

        input {

            width: 100%;

            padding: 16px;

            border: none;

            border-radius: 14px;

            background: #2d2d2d;

            color: white;

            font-size: 16px;

            outline: none;

            transition: 0.3s;
        }

        input:focus {

            border: 1px solid crimson;

            box-shadow:
                0 0 12px rgba(220, 20, 60, 0.35);
        }

        button {

            width: 100%;

            padding: 16px;

            border: none;

            border-radius: 14px;

            background:
                linear-gradient(135deg,
                    crimson,
                    #ff2f5b);

            color: white;

            font-size: 16px;

            font-weight: bold;

            cursor: pointer;

            transition: 0.3s;

            margin-top: 10px;
        }

        button:hover {

            transform: translateY(-2px);

            box-shadow:
                0 0 15px rgba(255, 0, 80, 0.3);
        }

        .links {

            margin-top: 25px;

            text-align: center;
        }

        .links a {

            color: #bbb;

            text-decoration: none;

            transition: 0.3s;
        }

        .links a:hover {

            color: gold;
        }

        .helper {

            color: #888;

            font-size: 13px;

            margin-top: 8px;

            line-height: 1.5;
        }

        @media(max-width:550px) {

            .box {

                padding: 30px 22px;
            }

            .logo h1 {

                font-size: 34px;
            }
        }
    </style>

</head>

<body>

    <div class="box">

        <!-- HEADER -->

        <div class="logo">

            <h1>
                🏆 Fantawrestling
            </h1>

            <p>

                Crea il tuo account
                e inizia a pronosticare
                gli eventi WWE live.

            </p>

        </div>

        <!-- FORM -->

        <form method="POST">

            <div class="field">

                <input type="text" name="username" placeholder="👤 Username" required>

            </div>

            <div class="field">

                <input type="email" name="email" placeholder="📧 Email" required>

            </div>

            <div class="field">

                <input type="password" name="password" placeholder="🔒 Password" required>

                <div class="helper">

                    Usa una password sicura.

                </div>

            </div>

            <div class="field">

                <input type="password" name="confirm_password" placeholder="🔐 Conferma Password" required>

            </div>

            <button type="submit">

                🚀 CREA ACCOUNT

            </button>

        </form>

        <!-- LINKS -->

        <div class="links">

            <a href="/user_login">

                Hai già un account?
                Effettua il login

            </a>

        </div>

    </div>

</body>

</html>
