<!DOCTYPE html>

<html lang="it">

<head>

    <meta charset="UTF-8">

    <title>Reset Password</title>

</head>

<body style="
    background:#111;
    color:white;
    font-family:Arial;
    padding:40px;
">

    <h1>
        🔑 Recupero Password
    </h1>

    <form method="POST">

        <input type="email" name="email" placeholder="Email" required style="
                padding:12px;
                width:300px;
                border:none;
                border-radius:10px;
                margin-bottom:15px;
            ">

        <br>

        <input type="text" name="contatto" placeholder="Telegram o Numero" required style="
                padding:12px;
                width:300px;
                border:none;
                border-radius:10px;
                margin-bottom:15px;
            ">

        <br>

        <button style="
            background:gold;
            color:black;
            border:none;
            padding:12px 18px;
            border-radius:10px;
            cursor:pointer;
            font-weight:bold;
        ">

            📩 Invia Richiesta

        </button>

    </form>

</body>

</html>
