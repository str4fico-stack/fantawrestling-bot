<!DOCTYPE html>
<html lang="it">

<head>

    <meta charset="UTF-8">
    <title>Login Admin</title>

    <style>

        body {
            background: #111;
            color: white;
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-box {
            background: #1e1e1e;
            padding: 40px;
            border-radius: 12px;
            width: 300px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border: none;
            border-radius: 8px;
        }

        button {
            margin-top: 20px;
            width: 100%;
            padding: 10px;
            background: gold;
            border: none;
            border-radius: 8px;
            font-weight: bold;
        }

    </style>

</head>

<body>

    <div class="login-box">

        <h2>🔐 Admin Login</h2>

        <form method="POST">

            <input
                type="text"
                name="username"
                placeholder="Username"
            >

            <input
                type="password"
                name="password"
                placeholder="Password"
            >

            <button type="submit">
                LOGIN
            </button>

        </form>

    </div>

</body>
</html>
