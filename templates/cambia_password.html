{% extends "base.html" %}

{% block title %}
Cambia Password
{% endblock %}

{% block content %}

<style>
    .password-box {

        max-width: 500px;

        margin: auto;

        margin-top: 70px;

        background: #1f1f1f;

        padding: 35px;

        border-radius: 20px;

        border: 1px solid #333;
    }

    .password-box h1 {

        color: gold;

        margin-bottom: 25px;
    }

    input {

        width: 100%;

        padding: 15px;

        margin-bottom: 18px;

        border: none;

        border-radius: 12px;

        background: #2a2a2a;

        color: white;

        font-size: 15px;
    }

    button {

        width: 100%;

        padding: 15px;

        border: none;

        border-radius: 12px;

        background: gold;

        color: black;

        font-weight: bold;

        cursor: pointer;
    }
</style>

<div class="password-box">

    <h1>
        🔐 Cambia Password
    </h1>

    <form method="POST">

        <input type="password" name="password_attuale" placeholder="Password Attuale" required>

        <input type="password" name="nuova_password" placeholder="Nuova Password" required>

        <input type="password" name="conferma_password" placeholder="Conferma Nuova Password" required>

        <button type="submit">

            AGGIORNA PASSWORD

        </button>

    </form>

</div>

{% endblock %}
