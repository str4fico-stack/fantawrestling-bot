<!DOCTYPE html>
<html lang="it">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Pronostici</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {

            background:
                linear-gradient(135deg,
                    #0f0f0f,
                    #1b1b1b);

            color: white;

            font-family: Arial;

            min-height: 100vh;

            padding: 25px;
        }

        .container {

            width: 100%;

            max-width: 1000px;

            margin: auto;
        }

        .header {

            margin-bottom: 40px;
        }

        .header h1 {

            color: gold;

            font-size: 42px;

            margin-bottom: 12px;
        }

        .header p {

            color: #aaa;

            font-size: 18px;
        }

        .match-box {

            background:
                linear-gradient(135deg,
                    #1d1d1d,
                    #282828);

            padding: 28px;

            border-radius: 24px;

            border: 1px solid #333;

            margin-bottom: 25px;
        }

        .match-title {

            color: white;

            font-size: 28px;

            margin-bottom: 25px;

            font-weight: bold;
        }

        .question {

            margin-bottom: 25px;
        }

        .question label {

            display: block;

            margin-bottom: 12px;

            color: #ddd;

            font-weight: bold;

            font-size: 16px;
        }

        select {

            width: 100%;

            padding: 16px;

            border: none;

            border-radius: 14px;

            background: #2c2c2c;

            color: white;

            font-size: 16px;

            outline: none;
        }

        option {

            background: #1f1f1f;
        }

        .bonus-box {

            margin-top: 25px;

            background: #2b1d00;

            border: 1px solid gold;

            border-radius: 16px;

            padding: 18px;
        }

        .bonus-label {

            display: flex;

            align-items: center;

            gap: 12px;

            cursor: pointer;

            font-weight: bold;

            color: gold;
        }

        .bonus-label input {

            width: 20px;

            height: 20px;
        }

        .submit-btn {

            width: 100%;

            padding: 18px;

            border: none;

            border-radius: 18px;

            background:
                linear-gradient(135deg,
                    crimson,
                    #ff2f5b);

            color: white;

            font-size: 18px;

            font-weight: bold;

            cursor: pointer;

            margin-top: 15px;
        }
    </style>

</head>

<body>

    <div class="container">

        <div class="header">

            <h1>
                🎮 {{ card.nome }}
            </h1>

            <p>

                Inserisci i tuoi pronostici WWE.
                Puoi usare il BONUS su un solo match.

            </p>

        </div>

        <form method="POST">

            {% for match in card.match %}

            <div class="match-box">

                <div class="match-title">

                    🏆 {{ match.nome }}

                </div>

                <!-- DOMANDA 1 -->

                <div class="question">

                    <label>

                        {{ match.domanda1 }}

                    </label>

                    <select name="risposta1_{{ match.id }}" required>

                        <option value="">
                            Seleziona risposta
                        </option>

                        {% for risposta in (match.risposte1 or '').split(',') %}

                        {% if risposta.strip() %}

                        <option value="{{ risposta.strip() }}">

                            {{ risposta.strip() }}

                        </option>

                        {% endif %}

                        {% endfor %}

                    </select>

                </div>

                <!-- DOMANDA 2 -->

                {% if match.domanda2 %}

                <div class="question">

                    <label>

                        {{ match.domanda2 }}

                    </label>

                    <select name="risposta2_{{ match.id }}">

                        <option value="">
                            Seleziona risposta
                        </option>

                        {% for risposta in (match.risposte2 or '').split(',') %}

                        {% if risposta.strip() %}

                        <option value="{{ risposta.strip() }}">

                            {{ risposta.strip() }}

                        </option>

                        {% endif %}

                        {% endfor %}

                    </select>

                </div>

                {% endif %}

                <!-- BONUS -->

                <div class="bonus-box">

                    <label class="bonus-label">

                        <input type="radio" name="bonus_match" value="{{ match.id }}">

                        ⭐ Attiva BONUS su questo match

                    </label>

                </div>

            </div>

            {% endfor %}

            <button type="submit" class="submit-btn">

                🚀 SALVA PRONOSTICI

            </button>

        </form>

    </div>

</body>

</html>
