{% extends "base.html" %}

{% block title %}
Modifica Match
{% endblock %}

{% block content %}

<style>
    .match-box {

        max-width: 700px;

        margin: auto;

        margin-top: 50px;

        background:
            linear-gradient(135deg,
                #1e1e1e,
                #262626);

        padding: 35px;

        border-radius: 22px;

        border: 1px solid #333;

        box-shadow:
            0 0 20px rgba(0, 0, 0, 0.35);
    }

    .match-box h1 {

        color: gold;

        margin-bottom: 30px;

        font-size: 36px;
    }

    .preview {

        width: 100%;

        height: 220px;

        object-fit: cover;

        border-radius: 16px;

        margin-bottom: 25px;

        border: 1px solid #333;
    }

    input {

        width: 100%;

        padding: 15px;

        margin-bottom: 20px;

        border: none;

        border-radius: 12px;

        background: #2d2d2d;

        color: white;

        font-size: 15px;

        outline: none;

        transition: 0.3s;
    }

    input:focus {

        border: 1px solid gold;

        box-shadow:
            0 0 10px rgba(255, 215, 0, 0.3);
    }

    .label {

        color: #bbb;

        margin-bottom: 10px;

        font-size: 15px;
    }

    button {

        width: 100%;

        padding: 16px;

        border: none;

        border-radius: 14px;

        background:
            linear-gradient(135deg,
                crimson,
                #ff2f5b);

        color: white;

        font-size: 16px;

        font-weight: bold;

        cursor: pointer;

        transition: 0.3s;
    }

    button:hover {

        transform: translateY(-2px);

        box-shadow:
            0 0 15px rgba(220, 20, 60, 0.3);
    }

    .back-btn {

        display: inline-block;

        margin-top: 20px;

        color: #bbb;

        text-decoration: none;

        transition: 0.3s;
    }

    .back-btn:hover {

        color: gold;
    }
</style>

<div class="match-box">

    <h1>
        ✏️ Modifica Match
    </h1>

    {% if match.immagine %}

    <img src="{{ match.immagine }}" class="preview">

    {% endif %}

    <form method="POST">

        <div class="label">

            Nome Match

        </div>

        <input type="text" name="nome" value="{{ match.nome }}" placeholder="Nome Match" required>

        <div class="label">

            URL Immagine

        </div>

        <input type="text" name="immagine" value="{{ match.immagine }}" placeholder="https://...">

        <div class="label">

            Domanda 1

        </div>

        <input type="text" name="domanda1" value="{{ match.domanda1 }}" placeholder="Domanda 1">

        <div class="label">

            Risposte domanda 1

        </div>

        <input type="text" name="risposte1" value="{{ match.risposte1 }}" placeholder="Risposte separate da virgola">

        <div class="label">

            Domanda 2

        </div>

        <input type="text" name="domanda2" value="{{ match.domanda2 }}" placeholder="Domanda 2">

        <div class="label">

            Risposte domanda 2

        </div>

        <input type="text" name="risposte2" value="{{ match.risposte2 }}" placeholder="Risposte separate da virgola">

        <button type="submit">

            💾 SALVA MODIFICHE

        </button>

    </form>

    <a href="/dashboard" class="back-btn">

        ← Torna al Dashboard

    </a>

</div>

{% endblock %}
