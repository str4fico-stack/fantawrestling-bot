<!DOCTYPE html>
<html lang="it">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Modifica Match</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {

            background:
                linear-gradient(135deg,
                    #0f0f0f,
                    #1b1b1b);

            color: white;

            font-family: Arial;

            min-height: 100vh;

            display: flex;

            justify-content: center;

            align-items: center;

            padding: 20px;
        }

        .box {

            width: 100%;

            max-width: 750px;

            background:
                linear-gradient(135deg,
                    #1d1d1d,
                    #282828);

            padding: 40px;

            border-radius: 24px;

            border: 1px solid #333;

            box-shadow:
                0 0 25px rgba(0, 0, 0, 0.45);
        }

        h1 {

            color: gold;

            margin-bottom: 12px;

            font-size: 36px;
        }

        .subtitle {

            color: #aaa;

            margin-bottom: 35px;

            line-height: 1.5;
        }

        .section {

            margin-bottom: 30px;
        }

        .section-title {

            color: crimson;

            margin-bottom: 18px;

            font-size: 20px;

            font-weight: bold;
        }

        .field {

            margin-bottom: 20px;
        }

        .field label {

            display: block;

            margin-bottom: 10px;

            color: #ddd;

            font-weight: bold;
        }

        input {

            width: 100%;

            padding: 16px;

            border: none;

            border-radius: 14px;

            background: #2d2d2d;

            color: white;

            font-size: 16px;

            outline: none;

            transition: 0.3s;
        }

        input:focus {

            border: 1px solid crimson;

            box-shadow:
                0 0 12px rgba(220, 20, 60, 0.4);
        }

        .helper {

            margin-top: 8px;

            color: #888;

            font-size: 13px;
        }

        .buttons {

            display: flex;

            gap: 15px;

            flex-wrap: wrap;

            margin-top: 15px;
        }

        button {

            flex: 1;

            min-width: 180px;

            padding: 16px;

            border: none;

            border-radius: 14px;

            cursor: pointer;

            font-size: 16px;

            font-weight: bold;

            transition: 0.3s;
        }

        .save-btn {

            background:
                linear-gradient(135deg,
                    crimson,
                    #ff2f5b);

            color: white;
        }

        .back-btn {

            background: #2d2d2d;

            color: white;
        }

        button:hover {

            transform: translateY(-2px);

            box-shadow:
                0 0 15px rgba(255, 0, 80, 0.35);
        }

        .back-link {

            text-decoration: none;

            flex: 1;
        }

        @media(max-width:650px) {

            .box {

                padding: 30px 22px;
            }

            h1 {

                font-size: 30px;
            }

            .buttons {

                flex-direction: column;
            }
        }
    </style>

</head>

<body>

    <div class="box">

        <h1>
            ✏️ Modifica Match
        </h1>

        <div class="subtitle">

            Configura domande,
            risposte e dettagli del match WWE.

        </div>

        <form method="POST">

            <!-- MATCH -->

            <div class="section">

                <div class="section-title">

                    🎮 Informazioni Match

                </div>

                <div class="field">

                    <label>
                        Nome Match
                    </label>

                    <input type="text" name="nome" value="{{ match.nome }}" placeholder="Roman Reigns vs Cody Rhodes"
                        required>

                </div>

            </div>

            <!-- DOMANDA 1 -->

            <div class="section">

                <div class="section-title">

                    ❓ Domanda 1

                </div>

                <div class="field">

                    <label>
                        Testo domanda
                    </label>

                    <input type="text" name="domanda1" value="{{ match.domanda1 }}" placeholder="Chi vincerà il match?">

                </div>

                <div class="field">

                    <label>
                        Risposte disponibili
                    </label>

                    <input type="text" name="risposte1" value="{{ match.risposte1 }}"
                        placeholder="Roman Reigns,Cody Rhodes">

                    <div class="helper">

                        Separa le risposte con una virgola.

                    </div>

                </div>

            </div>

            <!-- DOMANDA 2 -->

            <div class="section">

                <div class="section-title">

                    ❓ Domanda 2

                </div>

                <div class="field">

                    <label>
                        Testo domanda
                    </label>

                    <input type="text" name="domanda2" value="{{ match.domanda2 }}" placeholder="Ci sarà interferenza?">

                </div>

                <div class="field">

                    <label>
                        Risposte disponibili
                    </label>

                    <input type="text" name="risposte2" value="{{ match.risposte2 }}" placeholder="Si,No">

                    <div class="helper">

                        Separa le risposte con una virgola.

                    </div>

                </div>

            </div>

            <!-- BUTTONS -->

            <div class="buttons">

                <button type="submit" class="save-btn">

                    💾 SALVA MODIFICHE

                </button>

                <a href="/dashboard" class="back-link">

                    <button type="button" class="back-btn">

                        ← TORNA DASHBOARD

                    </button>

                </a>

            </div>

        </form>

    </div>

</body>

</html>
