<!DOCTYPE html>

<html lang="it">

<head>

    <meta charset="UTF-8">

    <title>Modifica Punti</title>

</head>

<body style="
    background:#111;
    color:white;
    font-family:Arial;
    padding:40px;
">

    <h1>
        🏆 Modifica Punti
    </h1>

    <h2>
        {{ user.username }}
    </h2>

    <form method="POST">

        <input
            type="number"
            name="punti"
            value="{{ user.punti }}"
            style="
                padding:12px;
                border-radius:10px;
                border:none;
                width:200px;
                margin-top:20px;
            "
        >

        <br><br>

        <button style="
            background:gold;
            color:black;
            border:none;
            padding:12px 18px;
            border-radius:10px;
            cursor:pointer;
            font-weight:bold;
        ">

            💾 Salva

        </button>

    </form>

</body>

</html>
